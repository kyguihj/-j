<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الشراء عبر Discord</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #7289da;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        .product-list {
            display: flex;
            justify-content: space-around;
            margin: 20px;
            flex-wrap: wrap;
        }

        .product {
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            width: 200px;
            text-align: center;
            margin: 10px;
        }

        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product h3 {
            margin: 10px 0;
        }

        .product button {
            background-color: #7289da;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .product button:hover {
            background-color: #5e6a8e;
        }

        .login-btn {
            background-color: #7289da;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }

        .login-btn:hover {
            background-color: #5e6a8e;
        }

        .discord-link {
            margin: 20px;
            text-align: center;
        }

        .discord-link a {
            text-decoration: none;
            color: #7289da;
            font-weight: bold;
        }

        .discord-link a:hover {
            text-decoration: underline;
        }

        .discord-note {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>مرحبًا بك في موقع الشراء عبر Discord</h1>
        <button class="login-btn" onclick="window.location.href='https://discord.com/oauth2/authorize?client_id=YOUR_CLIENT_ID&redirect_uri=YOUR_REDIRECT_URI&response_type=code&scope=identify'">تسجيل الدخول باستخدام Discord</button>
    </header>

    <div class="product-list">
        <div class="product">
            <img src="website_creation.jpg" alt="إنشاء موقع">
            <h3>إنشاء موقع</h3>
            <p>السعر: 7 مليون كريدت</p>
            <button onclick="buyProduct('إنشاء موقع', 7000000)">شراء</button>
        </div>
        <div class="product">
            <img src="discord_servers.jpg" alt="سيرفرات ديسكورد">
            <h3>سيرفرات ديسكورد</h3>
            <p>السعر: على حسب</p>
            <button onclick="buyProduct('سيرفرات ديسكورد', 'على حسب')">شراء</button>
        </div>
        <div class="product">
            <img src="minecraft_items.jpg" alt="أشياء ماين كرافت">
            <h3>أشياء ماين كرافت</h3>
            <p>السعر: 200,000 كريدت</p>
            <button onclick="buyProduct('أشياء ماين كرافت', 200000)">شراء</button>
        </div>
        <div class="product">
            <img src="image_creation.jpg" alt="إنشاء صور إلخ">
            <h3>إنشاء صور إلخ</h3>
            <p>السعر: 100,000 كريدت</p>
            <button onclick="buyProduct('إنشاء صور إلخ', 100000)">شراء</button>
        </div>
    </div>

    <div class="discord-link">
        <p>اضغط <a href="https://discord.gg/5BVcrS696S" target="_blank">هنا للاستلام</a></p>
        <p class="discord-note">الرجاء فتح الرابط من تطبيق Discord</p>
    </div>

    <script>
        // دالة الشراء
        function buyProduct(productName, amount) {
            const user = JSON.parse(localStorage.getItem("discordUser"));
            if (!user) {
                alert("يجب تسجيل الدخول باستخدام Discord أولاً.");
                return;
            }

            // إذا كانت التكلفة "على حسب" سيتم عرض رسالة مخصصة
            if (amount === 'على حسب') {
                alert(`تم طلب ${productName}. سيتم التواصل معك لتحديد السعر.`);
            } else {
                // إظهار رسالة تأكيد الشراء
                alert(`تم شراء ${productName} بنجاح بمبلغ ${amount} كريدت!`);
            }
        }
    </script>

</body>
</html>
